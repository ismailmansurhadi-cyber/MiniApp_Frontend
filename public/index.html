<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساسيات ببجي الأسطورية</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>

    <main id="app-container">

        <header>
            <h1>حساسيات ببجي الأسطورية</h1>
        </header>

        <section id="initial-choice-view">
            <h2>اختر مستواك:</h2>
            <div class="main-choice-container">
                <button id="pro-choice">أنا محترف</button>
                <button id="beginner-choice">أنا مبتدئ</button>
                <button id="open-admin-btn">لوحة التحكم</button>
            </div>
        </section>

        <section id="pro-sensitivities-view" class="sensitivities-view hidden">
            <h2>حساسيات المحترفين</h2>
            <div id="pro-buttons-container" class="button-container">
            </div>
        </section>

        <section id="beginner-sensitivities-view" class="sensitivities-view hidden">
            <h2>حساسيات المبتدئين</h2>
            <div id="beginner-buttons-container" class="button-container">
            </div>
        </section>

        <section id="display-container" class="sensitivity-display hidden">
            <img id="display-image" src="" alt="صورة الحساسية">
            <p id="code-output">اضغط على زر لعرض الكود</p>
        </section>
        
        <section id="admin-panel" class="admin-panel hidden">
            <h2>لوحة تحكم المالك</h2>
            <form id="add-sensitivity-form">
                <input type="text" id="admin-name-input" placeholder="اسم الحساسية" required>
                <textarea id="admin-code-input" placeholder="كود الحساسية" required></textarea>
                <input type="text" id="admin-image-input" placeholder="رابط الصورة" required>
                <select id="admin-type-select">
                    <option value="pro">محترف</option>
                    <option value="beginner">مبتدئ</option>
                </select>
                <button type="submit" id="form-submit-btn">إضافة</button>
            </form>
            <div id="admin-list" class="admin-list"></div>
            <button id="go-back-btn">العودة للواجهة الرئيسية</button>
        </section>
    </main>
    <div id="particles-js"></div>
    <script src="scripts.js"></script>
    
<script>
    particlesJS('particles-js', {
        "particles": {
            "number": {
                "value": 80,
                "density": {
                    "enable": true,
                    "value_area": 800
                }
            },
            "color": {
                "value": "#00ffff" // لون الجسيمات (أزرق سماوي متوهج)
            },
            "shape": {
                "type": "circle",
                "stroke": {
                    "width": 0,
                    "color": "#000000"
                },
                "polygon": {
                    "nb_sides": 5
                }
            },
            "opacity": {
                "value": 0.5,
                "random": false,
                "anim": {
                    "enable": false,
                    "speed": 1,
                    "opacity_min": 0.1,
                    "sync": false
                }
            },
            "size": {
                "value": 3,
                "random": true,
                "anim": {
                    "enable": false,
                    "speed": 40,
                    "size_min": 0.1,
                    "sync": false
                }
            },
            "line_linked": {
                "enable": true,
                "distance": 150,
                "color": "#00ffff", // لون الخطوط الرابطة
                "opacity": 0.4,
                "width": 1
            },
            "move": {
                "enable": true,
                "speed": 6,
                "direction": "none",
                "random": false,
                "straight": false,
                "out_mode": "out",
                "bounce": false,
                "attract": {
                    "enable": false,
                    "rotateX": 600,
                    "rotateY": 1200
                }
            }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": {
                "onhover": {
                    "enable": true,
                    "mode": "grab"
                },
                "onclick": {
                    "enable": true,
                    "mode": "push"
                },
                "resize": true
            },
            "modes": {
                "grab": {
                    "distance": 140,
                    "line_linked": {
                        "opacity": 1
                    }
                },
                "bubble": {
                    "distance": 400,
                    "size": 40,
                    "duration": 2,
                    "opacity": 8,
                    "speed": 3
                },
                "repulse": {
                    "distance": 200,
                    "duration": 0.4
                },
                "push": {
                    "particles_nb": 4
                },
                "remove": {
                    "particles_nb": 2
                }
            }
        },
        "retina_detect": true
    });
</script>
</body>
</html>
