<!DOCTYPE html>
<html lang="ar">
<head>

    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="button-container">
  <button data-sensitivity-code="5436-7890-1234-5678-9012">حساسية احترافية</button>
  <button data-sensitivity-code="9876-5432-1098-7654-3210">حساسية للمبتدئين</button>

                </div>
        </div>
