<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساسيات ببجي الأسطورية</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c2f33;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background-color: #3a3f36;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        h1 {
            color: #7289da;
        }
        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }
        input {
            background-color: #40444b;
            color: #ffffff;
        }
        button {
            cursor: pointer;
            background-color: #7289da;
            color: white;
            font-weight: bold;
        }
        button:disabled {
            background-color: #5b6e9a;
            cursor: not-allowed;
        }
        #lootbox-image {
            width: 150px;
            height: auto;
            margin: 20px 0;
        }
        #result-area {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #43b581;
        }
        #invitation-link-container {
            word-wrap: break-word;
            padding: 10px;
            background-color: #40444b;
            border-radius: 5px;
            margin-top: 10px;
            text-align: left;
        }
        .winner-list {
            background-color: #23272a;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .winner-list h3 {
            margin-top: 0;
            color: #43b581;
        }
        .winner-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #40444b;
            padding: 8px 0;
        }
        .winner-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <main id="app-container">
        
        <section id="initial-choice-view">
            <div class="title-box">
                <h1>إحتراف ببجي يبدأ من هنا</h1>
                <p>اختر مستواك لتجد أفضل الحساسيات</p>
            </div>
            <div class="main-choice-container">
                <button id="pro-choice">أنا محترف</button>
                <button id="beginner-choice">أنا مبتدئ</button>
                <button id="open-lootbox-button">صندوق الغنائم العشوائي 🎁</button>
                <button id="open-admin-btn">لوحة التحكم</button>
            </div>
        </section>

        <section id="pro-sensitivities-view" class="sensitivities-view hidden">
            <h2>حساسيات المحترفين</h2>
            <div id="pro-buttons-container" class="button-container">
            </div>
        </section>

        <section id="beginner-sensitivities-view" class="sensitivities-view hidden">
            <h2>حساسيات المبتدئين</h2>
            <div id="beginner-buttons-container" class="button-container">
            </div>
        </section>

        <section id="display-container" class="sensitivity-display hidden">
            <img id="display-image" src="" alt="صورة الحساسية">
            <p id="code-output">اضغط على زر لعرض الكود</p>
            <button id="copy-code-btn" style="margin-top: 10px;">نسخ الكود</button>
        </section>

        <section id="lootbox-view" class="sensitivities-view hidden">
<div class="container">
    <div id="lootbox-area">
        <h1>صندوق الغنائم 🎁</h1>
        <p id="description-text">قم بإدخال ID حسابك في ببجي للمتابعة.</p>
        <input type="text" id="player-id-input" placeholder="أدخل ID حسابك في ببجي">
        <button id="save-id-button">حفظ ID</button>

        <div id="invitation-area" style="display: none;">
            <p>الآن، قم بدعوة 3 مستخدمين لفتح الصندوق والحصول على جوائز.</p>
            <h2>رابط دعوتك 🔗</h2>
            <div id="invitation-link-container">
                <span id="invitation-link"></span>
            </div>
            <p id="invitation-counter">لقد دعوت 0 من 3 مستخدمين.</p>
            
            <img id="lootbox-image" src="https://i.ibb.co/6803h7Z/lootbox-closed.png" alt="صندوق الغنائم مغلق">
            <br>
            <button id="open-box-button" disabled>افتح الصندوق</button>
            <div id="result-area"></div>
        </div>

        <div class="winner-list">
            <h3>آخر الفائزين 🏆</h3>
            <ul id="winners-list-container"></ul>
        </div>
        
    </div>
</div>
<div style="text-align: center; margin-top: 20px;">
    <button id="hide-lootbox-button">العودة إلى الواجهة الرئيسية</button>
</div>
        </section>

    </main>
    <div id="particles-js"></div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="scripts.js"></script>
    <script>
        const showLootboxButton = document.getElementById('open-lootbox-button');
        const hideLootboxButton = document.getElementById('hide-lootbox-button');
        const initialChoiceView = document.getElementById('initial-choice-view');
        const lootboxView = document.getElementById('lootbox-view');

        const initialArea = document.getElementById('initial-area');
        const lootboxArea = document.getElementById('lootbox-area');
        const saveIdButton = document.getElementById('save-id-button');
        const playerIdInput = document.getElementById('player-id-input');
        const invitationArea = document.getElementById('invitation-area');
        const invitationLink = document.getElementById('invitation-link');
        const openBoxButton = document.getElementById('open-box-button');
        const winnersListContainer = document.getElementById('winners-list-container');
        const lootboxImage = document.getElementById('lootbox-image');
        const resultArea = document.getElementById('result-area');

        let user_id;

        function getUserId() {
            if (window.Telegram.WebApp.initDataUnsafe.user) {
                return window.Telegram.WebApp.initDataUnsafe.user.id;
            }
            return null;
        }
        
        function getUserName() {
            const user = window.Telegram.WebApp.initDataUnsafe.user;
            if (user) {
                return user.first_name || 'مستخدم';
            }
            return 'مستخدم';
        }

        window.Telegram.WebApp.ready();
        user_id = getUserId();
        
        showLootboxButton.onclick = function() {
            initialChoiceView.classList.add('hidden');
            lootboxView.classList.remove('hidden');
            initialArea.style.display = 'block';
            lootboxArea.style.display = 'none';
            fetchLastLooters();
        };

        hideLootboxButton.onclick = function() {
            lootboxView.classList.add('hidden');
            initialChoiceView.classList.remove('hidden');
        };

        saveIdButton.onclick = function() {
            const pubgId = playerIdInput.value.trim();
            if (pubgId) {
                console.log("Player ID saved:", pubgId);
                document.getElementById('description-text').textContent = 'ادعُ 3 مستخدمين لفتح الصندوق والحصول على جوائز.';
                playerIdInput.style.display = 'none';
                saveIdButton.style.display = 'none';
                invitationArea.style.display = 'block';

                const inviteLink = `https://t.me/your_bot_username?start=${user_id}`;
                invitationLink.textContent = inviteLink;
            } else {
                alert('الرجاء إدخال ID حسابك.');
            }
        };
        
        openBoxButton.onclick = async function() {
            if (confirm('هل أنت متأكد من فتح الصندوق؟')) {
                openBoxButton.disabled = true;
                resultArea.textContent = 'يتم فتح الصندوق...';
                lootboxImage.src = 'https://i.ibb.co/6803h7Z/lootbox-closed.png';
                
                const userName = getUserName();
                
                try {
                    const response = await fetch(`/api/lootbox?user_name=${encodeURIComponent(userName)}`);
                    const result = await response.json();
                    
                    resultArea.textContent = `لقد ربحت: ${result.name}`;
                    lootboxImage.src = result.imageUrl;
                    
                    fetchLastLooters();
                    
                } catch (error) {
                    console.error('Failed to open lootbox:', error);
                    resultArea.textContent = 'حدث خطأ. حاول مرة أخرى.';
                } finally {
                    openBoxButton.disabled = false;
                }
            }
        };

        async function fetchLastLooters() {
            try {
                const response = await fetch('/api/lastlooters');
                const winners = await response.json();
                
                winnersListContainer.innerHTML = '';
                
                if (winners.length > 0) {
                    winners.forEach(winner => {
                        const li = document.createElement('li');
                        li.className = 'winner-item';
                        li.innerHTML = `<span>${winner.name}</span><span>ربح ${winner.prize}</span>`;
                        winnersListContainer.appendChild(li);
                    });
                } else {
                    winnersListContainer.innerHTML = '<li>لا يوجد فائزون حتى الآن.</li>';
                }
            } catch (error) {
                console.error('Failed to fetch last looters:', error);
            }
        }
    </script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 80,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#00ffff"
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    },
                    "polygon": {
                        "nb_sides": 5
                    }
                },
                "opacity": {
                    "value": 0.5,
                    "random": false,
                    "anim": {
                        "enable": false,
                        "speed": 1,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": false,
                        "speed": 40,
                        "size_min": 0.1,
                        "sync": false
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#00ffff",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 6,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {
                        "enable": false,
                        "rotateX": 600,
                        "rotateY": 1200
                    }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "grab"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                    }
                },
                "modes": {
                    "grab": {
                        "distance": 140,
                        "line_linked": {
                            "opacity": 1
                        }
                    },
                    "bubble": {
                        "distance": 400,
                        "size": 40,
                        "duration": 2,
                        "opacity": 8,
                        "speed": 3
                    },
                    "repulse": {
                        "distance": 200,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    },
                    "remove": {
                        "particles_nb": 2
                    }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
